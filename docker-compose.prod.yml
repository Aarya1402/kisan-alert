version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: kisan-alert-db-prod
    restart: always
    environment:
      POSTGRES_USER: kisan
      POSTGRES_PASSWORD: production_secure_password
      POSTGRES_DB: kisan_alert
    volumes:
      - kisan_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisan -d kisan_alert"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kisan-alert-api-prod
    restart: always
    env_file:
      - ./server/.env
    environment:
      PORT: 4000
      DATABASE_URL: postgres://kisan:production_secure_password@db:5432/kisan_alert
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: kisan-alert-web-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  kisan_pgdata_prod:
