services:
  db:
    image: postgis/postgis:16-3.4
    container_name: kisan-alert-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kisan
      POSTGRES_PASSWORD: kisan
      POSTGRES_DB: kisan_alert
    ports:
      - "5544:5432"
    volumes:
      - kisan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisan -d kisan_alert"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  kisan_pgdata:
